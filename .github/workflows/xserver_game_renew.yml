name: XServer-Game-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/XServer-Game-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/xserver_game_renew.py xserver_game_renew.py

      - name: 🐍 安装 Python 依赖
        run: pip install requests --quiet

      - name: 🛡️ 启动 GOST 代理转发
        run: |
          if [ -z "$GOST_PROXY" ]; then exit 0; fi
          SINGBOX_VER="1.11.0"
          echo "📦 下载 sing-box v${SINGBOX_VER}..."
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          echo "🔗 解析代理协议..."
          python3 proxy_handler.py
          if [ -f config.json ]; then
            echo "✅ 代理配置已生成"
            nohup ./sing-box run -c config.json > singbox.log 2>&1 &
            sleep 5
            echo "✅ Proxy tunnel started"
          else
            echo "❌ 代理配置生成失败"
            exit 1
          fi

      - name: 🔧 执行续期
        env:
          XSERVER_GAME_ACCOUNT: ${{ secrets.XSERVER_GAME_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: python3 xserver_game_renew.py
